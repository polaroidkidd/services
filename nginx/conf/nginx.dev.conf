user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    # default_type  application/octet-stream;
    default_type text/html;
    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    #tcp_nopush     on;
    keepalive_timeout 65;
    #gzip  on;
    client_max_body_size 10G;
    proxy_request_buffering off;
    server {
        listen 8080;


        location /.well-known/acme-challenge/ {
            default_type "text/plain";
            root /var/www/;
        }

        client_max_body_size 10G;
        proxy_request_buffering off;
        # Required for LE certificate enrollment using certbot

        location /site {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://site:80;
        }


        location /staging {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://site-staging:80;
        }

        location /cloud {
            resolver 127.0.0.11 valid=30s;
            add_header Strict-Transport-Security "max-age=15768000";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://cloud;
        }

        location /qbt {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header X-Forwarded-Host $server_name:$server_port;
            proxy_hide_header Referer;
            proxy_hide_header Origin;
            proxy_set_header Referer '';
            proxy_set_header Origin '';
            proxy_http_version 1.1;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://qbt:8082;
        }
        location /radarr {
            resolver 127.0.0.11 valid=30s;

            # Suggested per https://github.com/Radarr/Radarr/wiki/Health-Checks#could-not-connect-to-signalr
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://radarr:7878;
        }
        location /sonarr {
            resolver 127.0.0.11 valid=30s;

            # Suggested per https://github.com/Radarr/Radarr/wiki/Health-Checks#could-not-connect-to-signalr
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://sonarr:8989;
        }

        location /jackett {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://jackett:9117;
        }

        location /bw {
            proxy_pass http://bitwarden:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notifications/hub {
            proxy_pass http://bitwarden:3012;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /notifications/hub/negotiate {
            proxy_pass http://bitwarden:80;
        }

    }

}