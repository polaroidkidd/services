            proxy_set_header Origin '';
            proxy_http_version 1.1;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://deluge:8112;
        }
    }


    server {
        listen 443 ssl http2;
        server_name radarr.dle.dev.local www.radarr.dle.dev.local;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;
        client_max_body_size 10G;
        proxy_request_buffering off;
        access_log /var/log/nginx/access.radarr.log;
        error_log /var/log/nginx/error.radarr.log;

        location / {
            resolver 127.0.0.11 valid=30s;

            # Suggested per https://github.com/Radarr/Radarr/wiki/Health-Checks#could-not-connect-to-signalr
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://radarr:7878;
        }
    }
