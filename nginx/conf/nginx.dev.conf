user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    # default_type  application/octet-stream;
    default_type text/html;
    log_format main
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    #tcp_nopush     on;
    keepalive_timeout 65;
    #gzip  on;
    client_max_body_size 10G;
    proxy_request_buffering off;
    server {
        listen 80;
        listen [::]:80;
        server_name dle.dev.local
            127.0.0.1 www.dle.dev.local
            127.0.0.1 cloud.dle.dev.local
            127.0.0.1 www.cloud.dle.dev.local
            127.0.0.1 plex.dle.dev.local
            127.0.0.1 www.plex.dle.dev.local
            127.0.0.1 radarr.dle.dev.local
            127.0.0.1 www.radarr.dle.dev.local
            127.0.0.1 sonarr.dle.dev.local
            127.0.0.1 www.sonarr.dle.dev.local
            127.0.0.1 jackett.dle.dev.local
            127.0.0.1 www.jackett.dle.dev.local
            127.0.0.1 qbt.dle.dev.local
            127.0.0.1 www.qbt.dle.dev.local
            127.0.0.1 deluge.dle.dev.local
            127.0.0.1 www.deluge.dle.dev.local
            127.0.0.1 coder-night.dle.dev.local
            127.0.0.1 www.coder-night.dle.dev.local;
        access_log /var/log/nginx/access.http.log;
        error_log /var/log/nginx/error.http.log;
        location '/.well-known/acme-challenge/' {
            default_type "text/plain";
            root /var/www/;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }
    server {
        listen 443 http2 ssl;
        server_name dle.dev.local www.dle.dev.local;
        server_tokens off;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;

        access_log /var/log/nginx/access.dle.log;
        error_log /var/log/nginx/error.dle.log;

        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_min_length 0;
        gzip_types text/plain
            text/css
            application/json
            application/x-javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript
            application/vnd.ms-fontobject
            application/x-font-ttf
            font/opentype;

        location / {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://site:80;
        }
    }

    server {
        listen 443 http2 ssl;
        server_name staging.dle.dev.local www.staging.dle.dev.local;
        server_tokens off;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;

        access_log /var/log/nginx/access.dle.log;
        error_log /var/log/nginx/error.dle.log;

        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_min_length 0;
        gzip_types text/plain
            text/css
            application/json
            application/x-javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript
            application/vnd.ms-fontobject
            application/x-font-ttf
            font/opentype;

        location / {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://site-staging:80;
        }
    }

    server {
        listen 443 http2 ssl;
        server_name cloud.dle.dev.local www.cloud.dle.dev.local;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;
        client_max_body_size 10G;
        proxy_request_buffering off;
        access_log /var/log/nginx/access.cloud.log;
        error_log /var/log/nginx/error.cloud.log;

        location = /.well-known/carddav {
            return 301 $scheme://$host:$server_port/remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 $scheme://$host:$server_port/remote.php/dav;
        }
        location /.well-known/webfinger {
            return 301 http://cloud/.well-known/webfinger;
        }
        location / {
            resolver 127.0.0.11 valid=30s;
            add_header Strict-Transport-Security "max-age=15768000";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60;
            proxy_connect_timeout 60;
            proxy_redirect off;
            proxy_pass http://cloud;
        }
    }

    server {
        listen 443 ssl http2;
        server_name qbt.dle.dev.local www.qbt.dle.dev.local;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;
        client_max_body_size 10G;
        proxy_request_buffering off;
        access_log /var/log/nginx/access.qbt.log;
        error_log /var/log/nginx/error.qbt.log;
        # Required for LE certificate enrollment using certbot
        location / {
            resolver 127.0.0.11 valid=30s;
            proxy_set_header X-Forwarded-Host $server_name:$server_port;
            proxy_hide_header Referer;
            proxy_hide_header Origin;
            proxy_set_header Referer '';
            proxy_set_header Origin '';
            proxy_http_version 1.1;
            add_header X-Frame-Options "SAMEORIGIN";
            proxy_pass http://qbt:8082;
        }
    }

    server {
        listen 443 ssl http2;
        server_name deluge.dle.dev.local www.deluge.dle.dev.local;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
