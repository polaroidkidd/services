    server {
        listen 443 ssl http2;
        server_name bw.dle.dev.local www.bw.dle.dev.local;

        # Specify SSL config if using a shared one.
        #include conf.d/ssl/ssl.conf;
        ssl_certificate /etc/letsencrypt.dev/live/dle.dev.local/cert.pem;
        ssl_certificate_key /etc/letsencrypt.dev/live/dle.dev.local/key.pem;
        include /etc/letsencrypt.dev/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt.dev/ssl-dhparams.pem;
        # Allow large attachments
        client_max_body_size 128M;
        access_log /var/log/nginx/access.bitwarden.log;
        error_log /var/log/nginx/error.bitwarden.log;
        location / {
            proxy_pass http://bitwarden:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notifications/hub {
            proxy_pass http://bitwarden:3012;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /notifications/hub/negotiate {
            proxy_pass http://bitwarden:80;
        }

        # Optionally add extra authentication besides the AUTH_TOKEN
        # If you don't want this, leave this part out
        #        location /admin {
        #            # See: https://docs.nginx.com/nginx/admin-guide/security-controls/configuring-http-basic-authentication/
