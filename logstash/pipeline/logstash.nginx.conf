input {
    udp {
        port => 1025
        queue_size => 50000
        type => "nginx"
    }
}

filter {
    grok {
        match => {
            "message" => "%{COMBINEDAPACHELOG}"
        }
    }
    date {
        match => [ "timestamp", "dd/MMM/YYYY:HH:mm:ss Z" ]
        locale => en
        remove_field => ["timestamp"]
    }
    geoip {
        source => "clientip"
    }
    useragent {
        source => "agent"
        target => "useragent"
    }
}

output {
    elasticsearch {
        hosts => "elastic:9200"
        user => "elastic-user"
        password => "elastic-password"
        index => "nginx"
        ecs_compatibility => disabled
    }
}